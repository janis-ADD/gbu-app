# Netlify-Konfiguration für SU24 GBU-App
# Voraussetzung: @netlify/plugin-nextjs (Auto-Install bei Next.js-Erkennung)

[build]
  base    = "web/"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js Runtime — wird von Netlify automatisch erkannt + installiert,
# Falls nicht: im Dashboard unter Plugins manuell hinzufügen.

# ─── Security-Headers ────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    # noindex bis Marketing-LP an ist:
    X-Robots-Tag           = "noindex, nofollow"

# Static Assets aggressiv cachen
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
